# Configuração da aplicação
quarkus.application.name=quarkus-keycloak-app

# Porta do servidor
quarkus.http.port=8080

# CORS - Permitir requisições do frontend
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# Configuração do Keycloak OIDC
quarkus.oidc.auth-server-url=http://localhost:8180/realms/quarkus-realm
quarkus.oidc.client-id=quarkus-app
quarkus.oidc.application-type=service
quarkus.oidc.token.issuer=any

# Política de autenticação
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Permitir acesso público ao health check
quarkus.http.auth.permission.public.paths=/q/health/*
quarkus.http.auth.permission.public.policy=permit

# Logs
quarkus.log.level=INFO
quarkus.log.category."io.quarkus.oidc".level=DEBUG

